<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asher Marahil — Ten Phases</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <button id="theme-toggle" title="Toggle theme">🌙</button>

  <!-- ── Lobby ─────────────────────────────────────────────────────────── -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-card">
      <h1 class="logo">Asher Marahil</h1>
      <p class="logo-sub">عشر مراحل &nbsp;·&nbsp; Ten Phases</p>

      <div class="form-group">
        <label for="player-name">Your Name</label>
        <input id="player-name" type="text" placeholder="Enter your name" maxlength="20" autocomplete="off">
      </div>

      <button id="create-room-btn" class="btn btn-primary">Create Room</button>

      <div class="divider"><span>or join existing</span></div>

      <div class="form-group">
        <label for="room-code-input">Room Code</label>
        <input id="room-code-input" type="text" placeholder="e.g. ABC123" maxlength="6"
               autocomplete="off" style="text-transform:uppercase; letter-spacing:4px; text-align:center;">
      </div>

      <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
      <div id="lobby-error" class="error-msg"></div>
    </div>
  </div>

  <!-- ── Waiting Room ───────────────────────────────────────────────────── -->
  <div id="waiting-screen" class="screen">
    <div class="waiting-card">
      <h2>Waiting Room</h2>
      <div class="room-code-box">
        Room Code: <strong id="room-code-display"></strong>
        <button id="copy-link-btn" class="btn btn-small">Copy Link</button>
      </div>
      <div id="player-list" class="player-list"></div>
      <button id="start-game-btn" class="btn btn-primary" style="display:none">Start Game</button>
      <p id="waiting-msg" class="muted">Waiting for host to start…</p>
    </div>
  </div>

  <!-- ── Game ──────────────────────────────────────────────────────────── -->
  <div id="game-screen" class="screen">

    <div id="scoreboard"></div>

    <div id="game-body">
      <div id="left-panel">
        <div id="phase-info-box">
          <div id="my-phase-label"></div>
          <div id="my-phase-desc"></div>
        </div>

        <div id="action-buttons">
          <button id="btn-lay-off" class="btn btn-secondary" disabled>Lay Off</button>
        </div>

        <div id="game-log-box">
          <h4>Game Log</h4>
          <div id="game-log"></div>
        </div>
      </div>

      <div id="right-panel">
        <div id="center-piles">
          <div id="draw-pile-area" class="pile-area">
            <div class="card card-pile card-back" id="draw-pile-card"></div>
            <span id="draw-count" class="pile-label">0 cards</span>
            <button id="btn-draw-deck" class="btn btn-small pile-btn" disabled>Draw</button>
          </div>
          <div id="discard-pile-area" class="pile-area">
            <div id="discard-top-card" class="card card-pile card-back"></div>
            <span class="pile-label">Discard</span>
            <button id="btn-draw-discard" class="btn btn-small pile-btn" disabled>Draw</button>
          </div>
        </div>
        <div id="phase-group-ui" style="display:none">
          <p id="phase-group-instructions"></p>
          <div id="phase-group-slots"></div>
          <div class="btn-row">
            <button id="btn-submit-phase" class="btn btn-primary">Play Group</button>
            <button id="btn-cancel-phase" class="btn btn-small">Clear</button>
          </div>
        </div>
        <div id="your-played-phase" style="display:none"></div>
        <div id="players-panel"></div>
      </div>
    </div>

    <div id="hand-panel">
      <div id="hand-header">
        <span id="hand-label">Your Hand</span>
        <span id="hand-selection-hint" class="muted"></span>
      </div>
      <div id="your-hand"></div>
    </div>

    <!-- Skip player picker modal -->
    <div id="skip-modal" class="modal" style="display:none">
      <div class="modal-box">
        <h3>Choose a player to skip</h3>
        <div id="skip-player-list"></div>
        <button id="skip-cancel-btn" class="btn btn-small">Cancel</button>
      </div>
    </div>

    <!-- Game Over overlay -->
    <div id="game-over-overlay" class="modal" style="display:none">
      <div class="modal-box">
        <h2 id="game-over-title">Game Over!</h2>
        <p id="game-over-winner"></p>
        <div id="game-over-scores"></div>
        <button id="btn-new-game" class="btn btn-primary">New Game</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
